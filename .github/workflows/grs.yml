# Reference: https://github.com/anuraghazra/github-readme-stats?tab=readme-ov-file#github-actions
name: Update README cards

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # necessary for amend to last commit to work
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Generate cards and README
        run: node scripts/generate.mjs
        env:
          PAT_1: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/ README.md
          if [ "$(git log -1 --format=%s)" = "Update README cards" ]; then
            git commit --amend --no-edit || exit 0
            git push --force-with-lease
          else
            git commit -m "Update README cards" || exit 0
            git push
          fi
